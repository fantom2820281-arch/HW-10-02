

version: '3.8'

services:
  # ===== PostgreSQL 13 =====
  postgres:
    image: postgres:13
    container_name: postgres_lab
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-sql:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - lab_network
    # Команды для проверки: docker exec -it postgres_lab psql -U admin -d app_db

  # ===== Redis 7 =====
  redis:
    image: redis:7
    container_name: redis_lab
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - lab_network
    # Команды: docker exec -it redis_lab redis-cli -a redis123

  # ===== MongoDB 5 =====
  mongo:
    image: mongo:5
    container_name: mongo_lab
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongo123
      MONGO_INITDB_DATABASE: app_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./init-mongo:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - lab_network
    # Команды: docker exec -it mongo_lab mongosh -u admin -p mongo123

  # ===== Neo4j 4.4 =====
  neo4j:
    image: neo4j:4.4
    container_name: neo4j_lab
    environment:
      NEO4J_AUTH: neo4j/neo4j123
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 512M
    ports:
      - "7474:7474"  # HTTP (браузер)
      - "7687:7687"  # Bolt (другие приложения)
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    networks:
      - lab_network
    # Веб-интерфейс: http://localhost:7474
    # login: neo4j, password: neo4j123

networks:
  lab_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  neo4j_data:
  neo4j_logs:

